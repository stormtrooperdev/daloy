##
## DaloyJS observability stack — Prometheus + Grafana
##
## Usage (from the repo root):
##   1. Start the demo app:
##        node --import tsx examples/metrics-demo.ts
##   2. In another terminal:
##        docker compose -f examples/observability/docker-compose.yml up
##   3. Open Grafana: http://localhost:3000  (admin / admin)
##      Open Prometheus: http://localhost:9090
##
## Prometheus is configured to scrape the demo app at
## host.docker.internal:3001/metrics (host-to-container bridge).
##
## On Linux, ensure "extra_hosts: host.docker.internal:host-gateway" works
## or replace host.docker.internal with your host IP in prometheus.yml.
##

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: daloy_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: daloy_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana_data:
