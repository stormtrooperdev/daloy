##
## DaloyJS observability stack — Prometheus + Grafana + Jaeger
##
## Metrics (RED + process gauges):
##   1. Start the metrics demo app:
##        node --import tsx examples/metrics-demo.ts
##   2. docker compose -f examples/observability/docker-compose.yml up
##   3. Open Grafana: http://localhost:3000  (admin / admin)
##      Open Prometheus: http://localhost:9090
##
## Traces (OpenTelemetry / OTLP):
##   1. Start the tracing demo app (exports OTLP spans to Jaeger):
##        node --import tsx examples/otel-tracing-demo.ts
##   2. docker compose -f examples/observability/docker-compose.yml up
##   3. Open Jaeger: http://localhost:16686  (service: daloy-otel-demo)
##
## Prometheus scrapes the metrics demo at host.docker.internal:3001/metrics.
## The tracing demo pushes spans to Jaeger's OTLP/HTTP endpoint on
## localhost:4318 (the demo runs on the host, Jaeger receives on the host port).
##
## On Linux, ensure "extra_hosts: host.docker.internal:host-gateway" works
## or replace host.docker.internal with your host IP in prometheus.yml.
##

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: daloy_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: daloy_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: daloy_jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver
      - "4317:4317" # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  grafana_data:
