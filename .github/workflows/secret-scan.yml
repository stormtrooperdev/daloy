# Secret scanning — gitleaks against PRs, pushes to main, and a daily
# scheduled sweep of the full git history.
#
# Why this exists (Aikido "Continuous Code Quality in CI/CD Pipelines"
# https://www.aikido.dev/blog/continuous-code-quality-ci-cd):
#
#   The Aikido write-up's "pre-commit / pre-merge / post-deploy" workflow
#   recommends a dedicated secret-detection gate that runs continuously,
#   independent of GitHub's hosted secret-scanning service. We already have:
#
#     * `verify:no-leaked-credentials` (npm tarball contents)
#     * `verify:secret-comparisons`    (timing-safe comparison gate)
#     * GitHub-native push protection + secret scanning (org setting)
#
#   What was missing: a CI step that runs gitleaks across the working tree
#   on every PR and across the *full git history* on a daily schedule, so
#   a secret that slips past push protection (e.g. via a fork PR whose
#   commits were rebased / squashed) is still caught before merge and any
#   long-lived secret that pre-dates push-protection enablement is flagged.
#
# Hardening (matches the rest of the repo's posture):
#
#   * No new third-party GitHub Action: the gitleaks binary is downloaded
#     directly from the official GitHub release and its SHA-256 is verified
#     before execution. This keeps the action trust surface unchanged
#     (still: harden-runner, checkout, setup-node, pnpm/action-setup,
#     step-security/harden-runner, codeql-action, zizmor-action,
#     anchore-sbom-action, scorecard-action). Adding `gitleaks/gitleaks-action`
#     would expand that surface for a binary we can pin by hash directly.
#   * Top-level `permissions: {}`; the single job opts in to `contents: read`.
#   * `step-security/harden-runner` in audit mode, sudo disabled.
#   * `actions/checkout` with `persist-credentials: false` and
#     `fetch-depth: 0` for the scheduled history sweep (PR runs use the
#     default shallow clone — `gitleaks protect --staged` is unnecessary
#     here because we scan the checked-out tree).
#   * No GitHub Actions cache (same rationale as `ci.yml` / `vuln-scan.yml`:
#     cache scope is shared between fork PRs and pushes to `main`).
#
# Failure policy:
#
#   PR / push runs are *blocking* on findings — a leaked credential is a
#   release-blocking issue per SECURITY.md "Response Target". The scheduled
#   history sweep is also blocking; the corresponding rotation playbook
#   lives in `SECURITY.md` ("Credential rotation").

name: Secret scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 04:21 UTC daily — offset from CodeQL (Mon 04:37), Vuln scan (06:13),
    # Scorecard (Tue 05:23), and Zizmor (07:00) so the scheduled security
    # workflows do not all queue at once.
    - cron: "21 4 * * *" # Daily at 04:21 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      # Pinned gitleaks release — bump in lockstep with the SHA-256 below.
      # Source of truth: https://github.com/gitleaks/gitleaks/releases
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true
          disable-file-monitoring: false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false
          # Full history for the scheduled sweep so gitleaks can walk
          # every commit; for PR / push runs a shallow clone is fine
          # because the checked-out tree is what gitleaks scans.
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      - name: Install gitleaks (verified SHA-256)
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          curl --proto '=https' --tlsv1.2 -sSfL "$url" -o "$archive"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/gitleaks"
          tar -xzf "$archive" -C "$RUNNER_TEMP/gitleaks" gitleaks
          rm -f "$archive"
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: gitleaks version
        run: gitleaks version

      - name: gitleaks (working tree)
        # `directory` scans the checked-out files. Fast, runs on every
        # PR and push so a leaked secret in the diff cannot be merged.
        # `--redact` keeps the matched value out of the public log.
        run: gitleaks dir --config .gitleaks.toml --no-banner --redact --verbose --exit-code 1 .

      - name: gitleaks (full git history)
        # Only runs on the scheduled sweep, when checkout fetched
        # `fetch-depth: 0`. Walks every commit ever made on the repo.
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: gitleaks git --config .gitleaks.toml --no-banner --redact --verbose --exit-code 1 .
