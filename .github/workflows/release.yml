# Publish to npm.
#
# This workflow exists in isolation from `ci.yml` for one reason:
# `id-token: write` is the credential the TanStack 2026-05-11 attackers
# extracted from runner memory after poisoning a CI cache. By keeping
# the token-minting workflow completely separate from anything triggered
# by fork PRs, a cache-poisoning chain cannot reach it.
#
# Hard rules for this file:
#   * Triggered ONLY by a tag push (`v*`) or manual dispatch by a maintainer.
#   * Runs in a protected GitHub Environment (`npm-publish`) that REQUIRES
#     a maintainer approval before any step executes.
#   * `id-token: write` is granted on the publish job only — never to
#     `verify`, never to anything that runs untrusted code.
#   * Builds and tests run BEFORE the publish job, in a job with no token.
#   * Publish uses `--provenance` (npm trusted publishing via OIDC). No
#     long-lived NPM_TOKEN is stored in repo secrets.
#   * No GitHub Actions cache is read or written. Cold installs only.
#   * `actions/checkout` uses `persist-credentials: false`.
#
# To roll a release:
#   1. Bump version in package.json and (if applicable) packages/*/package.json.
#   2. `git tag v<version> -s` (signed) and `git push --tags`.
#   3. Approve the pending workflow in the `npm-publish` environment.

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@daloyjs/core"
          - "create-daloy"
          - "all"
        default: "@daloyjs/core"

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install (no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          npm_config_ignore_scripts: "true"

      - name: Verify lockfile sources
        run: pnpm verify:lockfile

      - name: Verify zero runtime dependencies (Wave 8 governance gate)
        run: pnpm verify:no-runtime-deps

      - name: Verify no install-time lifecycle scripts (Aikido Package Health "Supply-Chain Scripts" gate)
        run: pnpm verify:no-lifecycle-scripts

      - name: Verify no bin script shadowing (Socket bin-script-confusion gate)
        run: pnpm verify:no-bin-shadowing

      - name: Verify secret-comparison single source of truth (Wave 8 governance gate)
        run: pnpm verify:secret-comparisons

      - name: Verify no unsafe Buffer APIs (Snyk "exploiting Buffer" gate)
        run: pnpm verify:no-unsafe-buffer

      - name: Verify no runtime remote-exec primitives (Aikido BlokTrooper gate)
        run: pnpm verify:no-remote-exec

      - name: Verify no runtime registry-exfiltration primitives (Socket GemStuffer gate)
        run: pnpm verify:no-registry-exfiltration

      - name: Verify GitHub Actions are SHA-pinned (Socket tj-actions/changed-files CVE-2025-30066 gate)
        run: pnpm verify:actions-pinned

      - name: Verify no vulnerable JS sandbox dependencies (Socket vm2 CVE-2026-26956 gate)
        run: pnpm verify:no-vulnerable-sandboxes

      - name: Verify Wave 9 pattern-agnostic parity audits
        run: pnpm verify:wave9-audits

      - name: Verify Wave 10 zero-runtime-deps + governance audits
        run: pnpm verify:wave10-audits

      - name: Verify Wave 11 multi-runtime parity bake-ins (Wave 11 governance gate)
        run: pnpm verify:wave11-audits

      - name: Verify Wave 12 mature-Node second-pass bake-ins (Wave 12 governance gate)
        run: pnpm verify:wave12-audits

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Generate CycloneDX 1.5 + SPDX 2.3 SBOMs (Aikido SBOM-standards gate)
        run: pnpm gen:sbom

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm coverage

      - name: Branch coverage gate (compiled JS)
        run: pnpm coverage:branches

      - name: Verify SBOMs match published manifests (Aikido SBOM-standards gate)
        run: pnpm verify:sbom

      - name: Verify no leaked credentials in publishable tarball contents (Snyk "leaked credentials in packages" gate)
        run: pnpm verify:no-leaked-credentials

      - name: Verify no invisible Unicode carriers (Aikido GlassWorm gate)
        run: pnpm verify:no-invisible-unicode

      - name: Verify no encoded-payload literals (Socket Obfuscation 101 gate)
        run: pnpm verify:no-encoded-payloads

      - name: Audit production dependencies
        run: pnpm audit --prod

  publish-core:
    name: Publish @daloyjs/core
    needs: verify
    if: |
      github.event_name == 'push' ||
      github.event.inputs.package == '@daloyjs/core' ||
      github.event.inputs.package == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ vars.NPM_PUBLISH_ENVIRONMENT || 'npm-publish' }}
      url: https://www.npmjs.com/package/@daloyjs/core
    permissions:
      contents: read
      # `id-token: write` is required by npm trusted publishing (OIDC).
      # It is granted ONLY here, ONLY after the protected environment
      # approval, and the job runs no third-party scripts.
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          # Lock egress to the registries we actually need. Anything else
          # (Session/Oxen, attacker C2, npm metadata abuse) is dropped.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install (no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          npm_config_ignore_scripts: "true"

      - name: Verify actor is on SECURITY-CONTACTS rotation (Wave 10)
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -eu
          node -e '
            const fs = require("node:fs");
            const text = fs.readFileSync("SECURITY-CONTACTS.md", "utf8");
            const m = text.match(/<!--\s*BEGIN ACTIVE\s*-->([\s\S]*?)<!--\s*END ACTIVE\s*-->/);
            if (!m) { console.error("::error::SECURITY-CONTACTS.md is missing the ACTIVE block."); process.exit(1); }
            const handles = [...m[1].matchAll(/^\s*-\s*handle:\s*([A-Za-z0-9][A-Za-z0-9._-]*)\s*$/gm)].map(x => x[1]);
            const actor = process.env.ACTOR;
            if (!handles.includes(actor)) {
              console.error(`::error::Actor "${actor}" is not on the SECURITY-CONTACTS active rotation. Active: ${handles.join(", ")}.`);
              process.exit(1);
            }
            console.log(`Actor "${actor}" is on the SECURITY-CONTACTS active rotation.`);
          '

      - name: Build
        run: pnpm build

      - name: Generate CycloneDX 1.5 + SPDX 2.3 SBOMs for publishable tarball
        run: pnpm gen:sbom

      - name: Verify SBOMs match published manifest before tarball is sealed
        run: pnpm verify:sbom

      - name: Verify no leaked credentials in publishable tarball contents (Snyk "leaked credentials in packages" gate)
        run: pnpm verify:no-leaked-credentials

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          set -eu
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"

  publish-create-daloy:
    name: Publish create-daloy
    needs: verify
    if: |
      github.event_name == 'push' ||
      github.event.inputs.package == 'create-daloy' ||
      github.event.inputs.package == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ vars.NPM_PUBLISH_ENVIRONMENT || 'npm-publish' }}
      url: https://www.npmjs.com/package/create-daloy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install (no scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          npm_config_ignore_scripts: "true"

      - name: Verify actor is on SECURITY-CONTACTS rotation (Wave 10)
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -eu
          node -e '
            const fs = require("node:fs");
            const text = fs.readFileSync("SECURITY-CONTACTS.md", "utf8");
            const m = text.match(/<!--\s*BEGIN ACTIVE\s*-->([\s\S]*?)<!--\s*END ACTIVE\s*-->/);
            if (!m) { console.error("::error::SECURITY-CONTACTS.md is missing the ACTIVE block."); process.exit(1); }
            const handles = [...m[1].matchAll(/^\s*-\s*handle:\s*([A-Za-z0-9][A-Za-z0-9._-]*)\s*$/gm)].map(x => x[1]);
            const actor = process.env.ACTOR;
            if (!handles.includes(actor)) {
              console.error(`::error::Actor "${actor}" is not on the SECURITY-CONTACTS active rotation. Active: ${handles.join(", ")}.`);
              process.exit(1);
            }
            console.log(`Actor "${actor}" is on the SECURITY-CONTACTS active rotation.`);
          '

      - name: Test create-daloy
        run: pnpm --filter create-daloy test

      - name: Generate CycloneDX 1.5 + SPDX 2.3 SBOMs for publishable tarball
        run: pnpm gen:sbom

      - name: Verify SBOMs match published manifest before tarball is sealed
        run: pnpm verify:sbom

      - name: Verify no leaked credentials in publishable tarball contents (Snyk "leaked credentials in packages" gate)
        run: pnpm verify:no-leaked-credentials

      - name: Publish create-daloy with provenance
        working-directory: packages/create-daloy
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
