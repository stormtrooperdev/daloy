# Dependabot keeps GitHub Actions and npm dependencies (incl. workspace
# packages) up to date so we benefit from upstream security fixes quickly
# and so action references can be migrated toward SHA-pinning over time.
#
# See https://docs.github.com/en/code-security/dependabot
version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      dev-dependencies:
        dependency-type: development
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: "/packages/create-daloy"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(create-daloy)"

  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      site-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(site)"
